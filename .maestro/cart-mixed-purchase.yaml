appId: com.dvnt.app
name: Cart mixed admission and coat-check purchase
---
- launchApp:
    clearState: false
- assertVisible: "DVNT"
- tapOn: "${EVENTS_TAB_TEXT:-Events}"
- tapOn: "${MAESTRO_EVENT_TITLE:-Mixed Cart Test Event}"
- tapOn: "${MAESTRO_ADMISSION_TIER:-General Admission}"
- tapOn: "${MAESTRO_COAT_CHECK_TIER:-Coat Check}"
- tapOn: "Review Cart"
- assertVisible: "Review Cart"
- assertVisible: "Admission"
- assertVisible: "Coat Check"
- assertVisible: "DVNT Service Fee"
- tapOn: "Continue to Payment"
- extendedWaitUntil:
    visible: "Apple Pay"
    timeout: 15000
- tapOn: "Apple Pay"
- extendedWaitUntil:
    visible: "Tickets Ready"
    timeout: 30000
- assertVisible: "Admission ticket"
- assertVisible: "Claim pass"
- assertVisible: "Add to Calendar"
- tapOn: "Add to Calendar"
- assertVisible:
    text: "Added to Calendar|Already in Calendar"
    optional: true
- tapOn: "View My Tickets"
- assertVisible: "My Tickets"
- assertVisible: "Coat Check"
